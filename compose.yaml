services:
  postgres:
    image: postgres:16
    container_name: card-mizer-postgres
    environment:
      POSTGRES_DB: cardmizer
      POSTGRES_USER: cardmizer
      POSTGRES_PASSWORD: cardmizer
    ports:
      - "55432:5432"
    volumes:
      - cardmizer-postgres-data:/var/lib/postgresql/data

volumes:
  cardmizer-postgres-data:
